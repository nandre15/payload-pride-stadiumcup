      <stop offset="0%" style="stop-color:#86007D;stop-opacity:1" />
      <stop offset="16.67%" style="stop-color:#0000F9;stop-opacity:1" />
      <stop offset="33.33%" style="stop-color:#008018;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFF41;stop-opacity:1" />
